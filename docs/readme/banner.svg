    <text x="153" y="560" fill="#111827" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" text-anchor="middle">Module</text>

    <text x="252" y="512" fill="#6B7280" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700">Forms</text>
    <text x="289" y="540" fill="#111827" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" text-anchor="middle">Zod</text>
    <text x="289" y="560" fill="#111827" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" text-anchor="middle">RHF</text>

    <text x="388" y="512" fill="#6B7280" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700">Quality</text>
    <text x="425" y="540" fill="#111827" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" text-anchor="middle">ESLint</text>
    <text x="425" y="560" fill="#111827" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" text-anchor="middle">Vitest</text>
  </g>

